{% set name = "duckargs" %}
{% set version = "1.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/eriknyquist/duckargs/archive/v{{ version }}.tar.gz
  sha256: eb12846b57f64114aa9fe222197e7b51f15363d81be2ffa7be9ebffb691fa4b8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - duckargs=duckargs.__main__:duckargs_python
    - duckargs-c=duckargs.__main__:duckargs_c
    - duckargs-python=duckargs.__main__:duckargs_python

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}

test:
  source_files:
    - tests
  imports:
    - duckargs
  commands:
    - pip check
    - duckargs --help
    - duckargs-c --help
    - duckargs-python --help
    # Skip test_readme_example it fails upstream too
    - pytest -vvv --capture=tee-sys -k "not test_readme_example" tests
  requires:
    - pip
    - pytest
    - python {{ python_min }}

about:
  home: http://github.com/eriknyquist/duckargs
  license: Apache-2.0
  license_file: LICENSE
  summary: Productivity tool for quickly creating python programs that parse command-line arguments.

extra:
  recipe-maintainers:
    - thewchan
